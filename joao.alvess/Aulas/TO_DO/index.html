<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background: #cdcdcd;
            padding: 16px;
        }
        h1{
            color: rgb(12, 86, 129);
            text-align: center;

        }
        .input-area{
            text-align: center;
            margin-bottom: 20px;
        }
        #tarefaInput{
            padding: 8px;
            width: 200px;
            border-radius: 8px;
        }
        #btnAdicionar{
            padding: 8px 12px;
            margin-left: 5px;
            color: white;
            background-color: rgb(93, 142, 216);
            border: #333 0px solid;
            border-radius: 8px;
            cursor: pointer;
        }
        #btnAdicionar:hover{
            color: aliceblue;
            background-color: aquamarine;
            transition: 0,2s;
        }
        ul{
            padding: 9px;
            margin-left: 28px;
        }
        li{
            background: #fff;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-content: center;
        }

    </style>
</head>
<body>
    <h1>Tarefas</h1>
    <div class="input-area">
        <input type="text" id="tarefaInput" placeholder="Digite sua Tarefa!">
        <button id="btnAdicionar">+</button>
    </div>

    <ul id="ListaTarefas">
        <li>Estudar</li>
    </ul>
</body>
</html>
